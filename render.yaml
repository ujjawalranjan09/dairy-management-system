services:
  # Backend Web Service
  - type: web
    name: dairy-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install && node node_modules/prisma/build/index.js generate
    startCommand: node node_modules/prisma/build/index.js db push && npm start
    envVars:
      - key: PORT
        value: 5000
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        value: file:./dev.db

  # Frontend Static Site
  - type: web
    name: dairy-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
